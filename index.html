<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Priyaaaa! 🎂</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for a cute, rounded look -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Canvas Confetti for the surprise button -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            overflow: hidden; /* This strictly prevents any scrolling */
            margin: 0;
            height: 100vh;
            width: 100vw;
        }

        /* Cozy animated pastel sunset background */
        .cozy-bg {
            background: linear-gradient(-45deg, #ffc3a0, #ffafbd, #fbc2eb, #a18cd1, #ffc3a0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card with entrance and floating animation */
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.5);
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       floatCard 6s ease-in-out infinite alternate 1s;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        /* Floating animation for background background emojis */
        .float-bg { position: absolute; opacity: 0; animation: fadeFloat 8s ease-in-out infinite; }
        .delay-1 { animation-delay: 1s; animation-duration: 7s; }
        .delay-2 { animation-delay: 2s; animation-duration: 9s; }
        .delay-3 { animation-delay: 0.5s; animation-duration: 6s; }

        @keyframes fadeFloat {
            0% { transform: translateY(20px) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            50% { transform: translateY(-30px) rotate(15deg); opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { transform: translateY(20px) rotate(-5deg); opacity: 0; }
        }
    </style>
</head>
<body class="cozy-bg flex items-center justify-center relative">

    <!-- Cozy Floating Background Elements -->
    <div class="float-bg delay-1 top-[15%] left-[10%] text-5xl pointer-events-none drop-shadow-md">✨</div>
    <div class="float-bg delay-2 top-[60%] left-[15%] text-6xl pointer-events-none drop-shadow-md">🎈</div>
    <div class="float-bg delay-3 top-[20%] right-[12%] text-6xl pointer-events-none drop-shadow-md">🎁</div>
    <div class="float-bg top-[70%] right-[10%] text-5xl pointer-events-none drop-shadow-md">🧸</div>

    <!-- Main Centered Container (The Cozy Card) -->
    <main class="w-full max-w-2xl px-4 md:px-0 z-10 flex justify-center items-center">
        
        <div class="glass-card w-full p-6 sm:p-10 md:p-12 rounded-[2.5rem] md:rounded-[3rem] flex flex-col items-center text-center gap-4 sm:gap-6">
            
            <!-- Bouncing Cake -->
            <div class="text-5xl md:text-7xl animate-bounce drop-shadow-lg">🎂</div>
            
            <!-- Titles -->
            <div class="space-y-1 sm:space-y-2">
                <h1 class="text-4xl sm:text-5xl md:text-7xl font-bold text-pink-500 drop-shadow-sm tracking-wide">
                    Happy Birthday!
                </h1>
                <h2 class="text-2xl sm:text-4xl md:text-5xl font-semibold text-purple-600 flex items-center justify-center gap-2">
                    Priyaaaa <span class="text-3xl md:text-4xl">😸</span>
                </h2>
            </div>

            <!-- Sweet Message -->
            <p class="text-sm sm:text-base md:text-xl text-gray-800 font-medium px-2 sm:px-8 leading-relaxed">
                Wishing the most amazing person a day filled with love, laughter, and lots of cake! You make the world a brighter place just by being in it. 💖
            </p>

            <!-- Glowing Surprise Button -->
            <button onclick="fireConfetti()" class="group relative px-6 py-3 sm:px-8 sm:py-4 bg-gradient-to-r from-pink-400 via-purple-400 to-pink-400 background-size-[200%] text-white font-bold text-base sm:text-xl rounded-full shadow-[0_5px_15px_rgba(236,72,153,0.4)] hover:shadow-[0_0_30px_rgba(236,72,153,0.7)] hover:scale-105 transition-all duration-300 overflow-hidden mt-2 border-2 border-white/50">
                <span class="relative z-10 flex items-center gap-2">
                    Click for a Surprise! <span class="group-hover:animate-ping inline-block">🎉</span>
                </span>
                <div class="absolute inset-0 bg-white/30 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
            </button>

            <!-- Compact Footer Message -->
            <div class="mt-2 sm:mt-4 pt-4 border-t-2 border-white/60 w-full flex flex-col gap-1">
                <h4 class="text-base sm:text-lg md:text-xl text-purple-700 font-semibold drop-shadow-sm">Hope all your wishes come true! ✨</h4>
                <p class="text-xs sm:text-sm md:text-base text-gray-600 font-medium">Made with ❤️ by [Your Name]</p>
            </div>

        </div>
    </main>

    <!-- JavaScript for interactive features -->
    <script>
        // Confetti function using canvas-confetti
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                // Fall from slightly higher
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#ff69b4', '#dda0dd']
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#ff69b4', '#dda0dd']
                }));
            }, 250);
        }

        // Fire a soft burst on load automatically
        window.onload = function() {
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#ffc3a0', '#ffafbd', '#fbc2eb', '#ffffff']
                });
            }, 600);
        };
    </script>
</body>
</html>
