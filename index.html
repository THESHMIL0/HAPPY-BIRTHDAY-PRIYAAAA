<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Priyaaaa! 🎂</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for a cute, rounded look -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Canvas Confetti for the surprise button -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            /* A cute animated pastel gradient background */
            background: linear-gradient(-45deg, #ffb3ba, #ffdfba, #ffffba, #baffc9, #bae1ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating animation for background elements */
        .float-1 { animation: float 6s ease-in-out infinite; }
        .float-2 { animation: float 8s ease-in-out infinite reverse; }
        .float-3 { animation: float 7s ease-in-out infinite 1s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 flex flex-col items-center justify-center relative pb-20">

    <!-- Decorative background emojis -->
    <div class="fixed top-10 left-10 text-4xl float-1 opacity-70 pointer-events-none">🎈</div>
    <div class="fixed top-40 right-20 text-5xl float-2 opacity-70 pointer-events-none">✨</div>
    <div class="fixed bottom-20 left-20 text-5xl float-3 opacity-70 pointer-events-none">🎁</div>
    <div class="fixed bottom-40 right-10 text-4xl float-1 opacity-70 pointer-events-none">🧸</div>

    <!-- Main Container -->
    <main class="w-full max-w-4xl px-6 pt-20 z-10 flex flex-col items-center text-center">
        
        <!-- Header Section -->
        <div class="bg-white/60 backdrop-blur-md p-8 rounded-[3rem] shadow-xl shadow-pink-200/50 border border-white/50 w-full mb-12">
            <div class="text-6xl mb-4 animate-bounce">🎂</div>
            <h1 class="text-5xl md:text-7xl font-bold text-pink-500 mb-2 drop-shadow-sm">
                Happy Birthday!
            </h1>
            <h2 class="text-3xl md:text-5xl font-semibold text-purple-500 mb-6 flex items-center justify-center gap-2">
                Priyaaaa <span class="text-4xl">😸</span>
            </h2>
            <p class="text-lg md:text-xl text-gray-700 max-w-2xl mx-auto font-medium">
                Wishing the most amazing person a day filled with love, laughter, and lots of cake! You make the world a brighter place just by being in it. 💖
            </p>
        </div>

        <!-- Interactive Button -->
        <button onclick="fireConfetti()" class="group relative px-8 py-4 bg-gradient-to-r from-pink-400 to-purple-400 text-white font-bold text-xl rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 overflow-hidden mb-16">
            <span class="relative z-10 flex items-center gap-2">
                Click for a Surprise! <span class="group-hover:animate-ping inline-block">🎉</span>
            </span>
            <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
        </button>

        <!-- Footer Message -->
        <div class="mt-10 text-center bg-white/60 backdrop-blur-sm px-8 py-6 rounded-3xl w-full max-w-2xl border border-white/50">
            <h4 class="text-2xl text-purple-600 mb-2">Hope all your wishes come true!</h4>
            <p class="text-gray-600">Made with ❤️ by [Your Name]</p>
        </div>
    </main>

    <!-- JavaScript for interactive features -->
    <script>
        // Confetti function using canvas-confetti
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                // since particles fall down, start a bit higher than random
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#ff69b4', '#dda0dd']
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#ff69b4', '#dda0dd']
                }));
            }, 250);
        }

        // Fire a small burst on load automatically
        window.onload = function() {
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#ff69b4', '#dda0dd', '#ffd700']
                });
            }, 500);
        };
    </script>
</body>
</html>
